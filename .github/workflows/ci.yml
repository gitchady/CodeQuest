name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Render Docker Compose config
        run: docker compose --env-file .env.example config

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app

      - name: Test
        run: pytest -q --basetemp=.pytest-tmp/ci

      - name: Dependency audit
        run: pip-audit -r requirements.txt -r requirements-dev.txt
