name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: perminof_test
          POSTGRES_USER: perminof
          POSTGRES_PASSWORD: perminof
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U perminof -d perminof_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Render Docker Compose config
        run: docker compose --env-file .env.example config

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app

      - name: Prepare pytest temp directory
        run: mkdir -p .pytest-tmp

      - name: Test
        run: pytest -q --basetemp=.pytest-tmp/ci

      - name: PostgreSQL integration tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://perminof:perminof@localhost:5432/perminof_test
        run: pytest -q tests/integration/api tests/integration/e2e --basetemp=.pytest-tmp/postgres

      - name: Dependency audit
        run: pip-audit -r requirements.txt -r requirements-dev.txt
