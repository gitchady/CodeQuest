services:
  api:
    build:
      context: .
      target: api
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/fastapi_education.db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-compose}
    ports:
      - "8000:8000"
    volumes:
      - app-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/fastapi_education.db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-compose}
    volumes:
      - app-data:/data
      - worker-docker:/var/lib/docker
    depends_on:
      redis:
        condition: service_healthy
    privileged: true
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  app-data:
  redis-data:
  worker-docker:
