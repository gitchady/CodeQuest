services:
  api:
    build:
      context: .
      target: api
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql+asyncpg://perminof:perminof@postgres:5432/perminof}
      CELERY_BROKER_URL: amqp://perminof:perminof@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-compose}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_MINUTES: ${JWT_REFRESH_TOKEN_EXPIRE_MINUTES:-43200}
    ports:
      - "8000:8000"
    volumes:
      - app-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql+asyncpg://perminof:perminof@postgres:5432/perminof}
      CELERY_BROKER_URL: amqp://perminof:perminof@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-compose}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_MINUTES: ${JWT_REFRESH_TOKEN_EXPIRE_MINUTES:-43200}
    volumes:
      - app-data:/data
      - worker-docker:/var/lib/docker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    privileged: true
    command: ["celery", "-A", "app.infrastructure.celery_app:celery_app", "worker", "--loglevel=info"]
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: perminof
      RABBITMQ_DEFAULT_PASS: perminof
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: perminof
      POSTGRES_USER: perminof
      POSTGRES_PASSWORD: perminof
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perminof -d perminof"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

volumes:
  app-data:
  redis-data:
  worker-docker:
  postgres-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
